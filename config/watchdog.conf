# Base directories
PROJECT_ROOT="${PROJECT_ROOT:-$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)}"
REPORT_DIR="${REPORT_DIR:-$PROJECT_ROOT/reports}"
LOG_DIR="${LOG_DIR:-$PROJECT_ROOT/logs}"
ARCHIVE_DIR="${ARCHIVE_DIR:-$PROJECT_ROOT/archive}"

# Task 1: Top IP analysis
ACCESS_LOG_FILE="${ACCESS_LOG_FILE:-$LOG_DIR/access.log}"
TOP_N="${TOP_N:-5}"
SUSPICIOUS_THRESHOLD="${SUSPICIOUS_THRESHOLD:-2}"
TOP_IP_REPORT_FILE="${TOP_IP_REPORT_FILE:-$REPORT_DIR/top_ips_$(date +%F).txt}"
SUSPICIOUS_IP_REPORT_FILE="${SUSPICIOUS_IP_REPORT_FILE:-$REPORT_DIR/suspicious_ips_$(date +%F).txt}"
BLOCKED_IP_REPORT_FILE="${BLOCKED_IP_REPORT_FILE:-$REPORT_DIR/blocked_ips_$(date +%F).txt}"

# Defensive blocking with iptables
BLOCK_SUSPICIOUS_IPS="${BLOCK_SUSPICIOUS_IPS:-0}"
IPTABLES_BIN="${IPTABLES_BIN:-iptables}"
IPTABLES_CHAIN="${IPTABLES_CHAIN:-WATCHDOG_BLOCKLIST}"
IPTABLES_DRY_RUN="${IPTABLES_DRY_RUN:-1}"
BLOCK_TARGET_PORTS="${BLOCK_TARGET_PORTS:-80,443}"
BLOCK_REASON="${BLOCK_REASON:-watchdog-suspicious-ip}"
ALERT_ON_BLOCK="${ALERT_ON_BLOCK:-0}"

# Task 2: Health check
HEALTH_URL="${HEALTH_URL:-http://example.com}"
HEALTH_TIMEOUT="${HEALTH_TIMEOUT:-5}"
HEALTH_MAX_FAILURES="${HEALTH_MAX_FAILURES:-3}"
HEALTH_LOG_FILE="${HEALTH_LOG_FILE:-$REPORT_DIR/health_$(date +%F).log}"
ALERT_EMAIL_TO="${ALERT_EMAIL_TO:-izwanhusainy02@gmail.com}"
ALERT_EMAIL_FROM="${ALERT_EMAIL_FROM:-a9ufplup@gmail.com}"
SMTP_HOST="${SMTP_HOST:-localhost}"
SMTP_PORT="${SMTP_PORT:-25}"
EMAIL_ALERTS_ENABLED="${EMAIL_ALERTS_ENABLED:-0}"

# Task 3: Cleanup job
DB_ROOT="${DB_ROOT:-$PROJECT_ROOT/demo/database/db}"
CLEANUP_DAYS="${CLEANUP_DAYS:-1}"
CLEANUP_LOG_FILE="${CLEANUP_LOG_FILE:-$REPORT_DIR/cleanup_$(date +%F).log}"

# Dashboard / metrics
DASHBOARD_FILE="${DASHBOARD_FILE:-$REPORT_DIR/dashboard.txt}"
FLASK_HOST="${FLASK_HOST:-127.0.0.1}"
FLASK_PORT="${FLASK_PORT:-5000}"
METRICS_ROUTE="${METRICS_ROUTE:-/metrics}"

# Report retention and archive
REPORT_RETENTION_DAYS="${REPORT_RETENTION_DAYS:-1}"
ARCHIVE_RETENTION_DAYS="${ARCHIVE_RETENTION_DAYS:-30}"
ARCHIVE_PREFIX="${ARCHIVE_PREFIX:-watchdog_reports}"

# Prometheus / Grafana docs helpers
PROMETHEUS_SCRAPE_INTERVAL="${PROMETHEUS_SCRAPE_INTERVAL:-15s}"
PROMETHEUS_JOB_NAME="${PROMETHEUS_JOB_NAME:-smart-watchdog}"
